<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projections Dashboard</title>
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1.0.15/sky-addin-client.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: transparent; overflow: hidden; }
    .content { padding: 16px; }
    h1 { color: #0066cc; font-size: 1.1rem; margin-bottom: 8px; }
    p { color: #555; font-size: 0.85rem; }
    #debug { margin-top: 12px; font-size: 0.75rem; color: #999; word-break: break-all; }
  </style>
</head>
<body>
  <div class="content">
    <h1>✅ Projections Tile</h1>
    <p>Mackinac Center for Public Policy</p>
    <div id="debug">Waiting for initialization...</div>
  </div>

  <script>
    const debugEl = document.getElementById('debug');

    const allowedOrigins = [
      /^https:\/\/[\w\-\.]+\.blackbaud\.com$/,
      /^https:\/\/[\w\-\.]+\.blackbaudhosting\.com$/,
      /^https:\/\/[\w\-\.]+\.bbcloudservices\.com$/,
      /^https:\/\/[\w\-\.]+\.sky\.blackbaud\.com$/,
      /^https:\/\/[\w\-\.]+\.nxt\.blackbaud\.com$/,
      /^https:\/\/host\.nxt\.blackbaud\.com$/,
      /^https:\/\/[\w\-\.]+\.cloudfront\.net$/
    ];

    window.addEventListener('message', (e) => {
      const isAllowed = allowedOrigins.some(regex => regex.test(e.origin));
      if (!isAllowed) {
        console.warn('Rejected message from unauthorized origin:', e.origin);
        return;
      }
      debugEl.textContent = `Origin: ${e.origin} | Data: ${JSON.stringify(e.data).substring(0, 100)}`;
    });

    const client = new BBSkyAddinClient.AddinClient({
      callbacks: {
        init: (args) => {
          debugEl.textContent = 'Init received!';
          args.ready({
            showUI: true,
            title: 'Projections Dashboard'
          });
        }
      },
      allowedOrigins: allowedOrigins
    });
  </script>
</body>
</html>

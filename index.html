<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projections Dashboard</title>
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1.0.15/sky-addin-client.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #0066cc; font-size: 1.1rem; margin-bottom: 8px; }
    p { color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Projections Tile is Live</h1>
    <p>Mackinac Center for Public Policy</p>
    <p style="margin-top:10px; font-size:0.75rem; color:#999;">GitHub Pages host confirmed working.</p>
  </div>
  <script>
    var client = new BBSkyAddinClient.AddinClient({
      callbacks: {
        init: function(args) {
          args.ready({ showUI: true, title: 'Projections Dashboard' });
        }
      }
    });
  </script>
</body>
</html>

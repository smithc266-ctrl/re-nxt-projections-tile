<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projections Dashboard</title>
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; }
    body { font-family: 'Segoe UI', sans-serif; background: transparent; }
    .content { padding: 16px; }
    h1 { color: #0066cc; font-size: 1.1rem; margin-bottom: 8px; }
    p { color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="content">
    <h1>✅ Projections Tile</h1>
    <p>Mackinac Center for Public Policy</p>
    <p>Dashboard loading...</p>
  </div>
  <script>
    (function () {
      var client = new BBSkyAddinClient.AddinClient({
        callbacks: {
          init: function(args) {
            args.ready({
              showUI: true,
              title: 'Projections Dashboard'
            });
            setTimeout(function() {
              client.resizeAddinIframe({
                height: document.body.scrollHeight
              });
            }, 100);
          }
        }
      });
    }());
  </script>
</body>
</html>

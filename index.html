<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projections Dashboard</title>
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1.0.15/sky-addin-client.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
      overflow: hidden;
    }
    .content {
      padding: 16px;
    }
    h1 { color: #0066cc; font-size: 1.1rem; margin-bottom: 8px; }
    p { color: #555; font-size: 0.85rem; }
    #debug { margin-top: 12px; font-size: 0.75rem; color: #999; word-break: break-all; }
  </style>
</head>
<body>
  <div class="content">
    <h1>✅ Projections Tile</h1>
    <p>Mackinac Center for Public Policy</p>
    <div id="debug">Waiting for init...</div>
  </div>
  <script>
    window.addEventListener('message', function(e) {
      document.getElementById('debug').textContent = 'Origin: ' + e.origin + ' | Data: ' + JSON.stringify(e.data).substring(0, 100);
    });

    var client = new BBSkyAddinClient.AddinClient({
      callbacks: {
        init: function(args) {
          document.getElementById('debug').textContent = 'Init received!';
          // Notify Blackbaud of our height so it sizes the iframe correctly
          var height = document.body.scrollHeight;
          args.ready({
            showUI: true,
            title: 'Projections Dashboard',
            tileConfig: {
              summaryStyle: BBSkyAddinClient.AddinTileSummaryStyle.None
            }
          });
        }
      },
      allowedOrigins: [
        /^https:\/\/[\w\-\.]+\.blackbaud\.com$/,
        /^https:\/\/[\w\-\.]+\.blackbaudhosting\.com$/,
        /^https:\/\/[\w\-\.]+\.bbcloudservices\.com$/,
        /^https:\/\/[\w\-\.]+\.sky\.blackbaud\.com$/,
        /^https:\/\/[\w\-\.]+\.nxt\.blackbaud\.com$/,
        /^https:\/\/host\.nxt\.blackbaud\.com$/
      ]
    });
  </script>
</body>
</html>
